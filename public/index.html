<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lead Generator</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Lead Generator</h1>
      <p class="page-subtitle">
        Enrich company info từ website và LinkedIn public company page
      </p>

      <div class="form-box">
        <select id="industryInput">
          <option value="">-- Chọn ngành --</option>
          <option value="fmcg">FMCG</option>
          <option value="technology">Technology</option>
          <option value="banking">Banking</option>
          <option value="retail">Retail</option>
          <option value="education">Education</option>
          <option value="healthcare">Healthcare</option>
          <option value="real-estate">Real Estate</option>
          <option value="logistics">Logistics</option>
          <option value="manufacturing">Manufacturing</option>
          <option value="ecommerce">E-Commerce</option>
          <option value="insurance">Insurance</option>
          <option value="hospitality">Hospitality</option>
          <option value="media">Media</option>
          <option value="telecommunications">Telecommunications</option>
          <option value="automotive">Automotive</option>
          <option value="pharmaceutical">Pharmaceutical</option>
          <option value="energy">Energy</option>
          <option value="food-beverage">Food & Beverage</option>
          <option value="construction">Construction</option>
          <option value="fashion">Fashion</option>
        </select>

        <button id="generateBtn">Generate Leads</button>
      </div>

      <div id="loading" class="hidden">Đang xử lý dữ liệu...</div>
      <div id="summary"></div>

      <h2 class="section-title">Companies</h2>
      <div id="companiesTable"></div>

      <h2 class="section-title">Employees</h2>
      <div id="employeesTable"></div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
